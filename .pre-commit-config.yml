repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict

  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo
        args: [fmt, --all, --check]
        language: system
        pass_filenames: false
        always_run: true

      - id: cargo-check
        name: cargo check
        entry: cargo
        args: [check, --all-targets]
        language: system
        pass_filenames: false
        always_run: true

      - id: cargo-clippy
        name: cargo clippy
        entry: cargo
        args: [clippy, --all-targets, --all-features]
        language: system
        pass_filenames: false
        always_run: true

      - id: cargo-test
        name: cargo test
        entry: cargo
        args: [test, --verbose]
        language: system
        pass_filenames: false
        always_run: true
